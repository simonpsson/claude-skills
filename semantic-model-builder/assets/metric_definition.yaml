# Metric Definition Template
# Generated by: scripts/metric_template_generator.py
# Fill in all fields marked [REQUIRED] before use.
# Validate with: python scripts/model_yaml_validator.py --input assets/metric_definition.yaml --strict

metrics:
  - name: [REQUIRED]  # snake_case, e.g. monthly_recurring_revenue
    description: "[REQUIRED] One sentence: what this metric measures and why it matters."
    label: "[REQUIRED] Human-readable label, e.g. 'Monthly Recurring Revenue'"
    type: simple  # simple | ratio | cumulative | derived
    type_params:
      measure:
        name: [REQUIRED]  # name of the underlying measure in the semantic model
        fill_nulls_with: 0
    filter: |
      # Optional: semantic layer filter expression
      # {{ Dimension('order__status') }} = 'completed'
    meta:
      owner: "[REQUIRED] team or Slack handle"
      data_source: "[REQUIRED] dbt model or table, e.g. ref('fct_subscriptions')"
      grain: "[REQUIRED] e.g. one row per subscription per month"
      business_context: >
        [REQUIRED] Why does this metric exist? Who uses it?
        What decisions does it inform?
      calculation_notes: >
        [OPTIONAL] Edge cases, exclusions, known gotchas.
      good_value_range: "[OPTIONAL] e.g. > $2M = healthy; < $1M = at-risk"
      verified_by: "[OPTIONAL] name of person who verified the definition"
      last_verified: "[OPTIONAL] YYYY-MM-DD"

